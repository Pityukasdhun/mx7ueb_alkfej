<h2>Users</h2>

<section style="display:grid; gap:12px; max-width:600px;">

  <div style="border:1px solid #ddd; padding:12px; border-radius:8px;">
    <h3>Add user</h3>

    <div style="display:flex; gap:8px; flex-wrap:wrap;">
      <input
        [(ngModel)]="displayName"
        placeholder="Display name"
      />

      <input
        [(ngModel)]="email"
        placeholder="Email"
      />

      <button (click)="create()">Add</button>
    </div>
  </div>

  <div *ngIf="loading">Loading...</div>
  <div *ngIf="error" style="color:#b00020;">{{ error }}</div>

  <div style="border:1px solid #ddd; padding:12px; border-radius:8px;">
    <h3>User list</h3>

    <div *ngIf="users.length === 0 && !loading">
      No users yet.
    </div>

    <ul style="list-style:none; padding:0; display:grid; gap:8px;">
      <li
        *ngFor="let u of users"
        style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:6px;"
      >
        <div>
          <b>{{ u.displayName }}</b><br />
          {{ u.email }}
        </div>

        <div style="font-size:12px; color:#666;">
          id: {{ u.id }}
        </div>
      </li>
    </ul>
  </div>

</section>

name: Build & Push (GHCR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute GHCR image namespace
        id: vars
        shell: bash
        run: |
          # Biztonságos kisbetűsítés idézőjelekkel
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NS=ghcr.io/${OWNER_LC}/${REPO_LC}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} 
          # Megjegyzés: A GITHUB_TOKEN alapból működik, nem kell külön PAT (GHCR_TOKEN), 
          # hacsak nem egy másik fiókba akarsz pusholni.

      - name: Build & push book-service
        run: |
          docker build -t ${{ steps.vars.outputs.IMAGE_NS }}/book-service:latest ./services/book-service
          docker push ${{ steps.vars.outputs.IMAGE_NS }}/book-service:latest

      - name: Build & push user-service
        run: |
          docker build -t ${{ steps.vars.outputs.IMAGE_NS }}/user-service:latest ./services/user-service
          docker push ${{ steps.vars.outputs.IMAGE_NS }}/user-service:latest

      - name: Build & push mcp-server
        run: |
          docker build -t ${{ steps.vars.outputs.IMAGE_NS }}/mcp-server:latest ./services/mcp-server
          docker push ${{ steps.vars.outputs.IMAGE_NS }}/mcp-server:latest

      - name: Build & push frontend
        run: |
          docker build -t ${{ steps.vars.outputs.IMAGE_NS }}/frontend:latest ./frontend
          docker push ${{ steps.vars.outputs.IMAGE_NS }}/frontend:latest
name: Build and Push Docker Images

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build book-service
        run: |
          docker build -t ghcr.io/${{ github.repository }}/book-service:latest ./services/book-service
          docker push ghcr.io/${{ github.repository }}/book-service:latest

      - name: Build user-service
        run: |
          docker build -t ghcr.io/${{ github.repository }}/user-service:latest ./services/user-service
          docker push ghcr.io/${{ github.repository }}/user-service:latest

      - name: Build mcp-server
        run: |
          docker build -t ghcr.io/${{ github.repository }}/mcp-server:latest ./services/mcp-server
          docker push ghcr.io/${{ github.repository }}/mcp-server:latest

      - name: Build frontend
        run: |
          docker build -t ghcr.io/${{ github.repository }}/frontend:latest ./frontend
          docker push ghcr.io/${{ github.repository }}/frontend:latest
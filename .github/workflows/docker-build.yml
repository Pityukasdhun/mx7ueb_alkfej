name: Build and Push Docker Images

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute GHCR namespace
        id: ns
        shell: bash
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image_ns=ghcr.io/${OWNER_LC}/${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push book-service
        run: |
          docker build -t ${{ steps.ns.outputs.image_ns }}/book-service:latest ./services/book-service
          docker push ${{ steps.ns.outputs.image_ns }}/book-service:latest

      - name: Build and push user-service
        run: |
          docker build -t ${{ steps.ns.outputs.image_ns }}/user-service:latest ./services/user-service
          docker push ${{ steps.ns.outputs.image_ns }}/user-service:latest

      - name: Build and push mcp-server
        run: |
          docker build -t ${{ steps.ns.outputs.image_ns }}/mcp-server:latest ./services/mcp-server
          docker push ${{ steps.ns.outputs.image_ns }}/mcp-server:latest

      - name: Build and push frontend
        run: |
          docker build -t ${{ steps.ns.outputs.image_ns }}/frontend:latest ./frontend
          docker push ${{ steps.ns.outputs.image_ns }}/frontend:latest
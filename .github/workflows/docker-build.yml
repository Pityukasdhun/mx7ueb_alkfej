name: Build & Push (GHCR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute GHCR image namespace (lowercase owner)
        id: vars
        shell: bash
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="${{ github.event.repository.name }}"
          echo "OWNER_LC=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "REPO=${REPO}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NS=ghcr.io/${OWNER_LC}/${REPO}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build & push book-service
        run: |
          docker build -t ${{ steps.vars.outputs.IMAGE_NS }}/book-service:latest ./services/book-service
          docker push ${{ steps.vars.outputs.IMAGE_NS }}/book-service:latest

      - name: Build & push user-service
        run: |
          docker build -t ${{ steps.vars.outputs.IMAGE_NS }}/user-service:latest ./services/user-service
          docker push ${{ steps.vars.outputs.IMAGE_NS }}/user-service:latest

      - name: Build & push mcp-server
        run: |
          docker build -t ${{ steps.vars.outputs.IMAGE_NS }}/mcp-server:latest ./services/mcp-server
          docker push ${{ steps.vars.outputs.IMAGE_NS }}/mcp-server:latest

      - name: Build & push frontend
        run: |
          docker build -t ${{ steps.vars.outputs.IMAGE_NS }}/frontend:latest ./frontend
          docker push ${{ steps.vars.outputs.IMAGE_NS }}/frontend:latest

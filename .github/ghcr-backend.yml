name: Build & Push (GHCR) - Backend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image namespace (lowercase owner)
        id: vars
        shell: bash
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="${{ github.event.repository.name }}"
          echo "IMAGE_NS=ghcr.io/${OWNER_LC}/${REPO}" >> "$GITHUB_OUTPUT"
          echo "SHA_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "OWNER_LC=${OWNER_LC}" >> "$GITHUB_OUTPUT"

      - name: Verify GHCR_TOKEN secret is set
        shell: bash
        run: |
          if [ -z "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "ERROR: GHCR_TOKEN secret is missing/empty."
            exit 1
          fi

      - name: Login to GHCR (PAT)
        shell: bash
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ steps.vars.outputs.OWNER_LC }}" --password-stdin

      - name: Build & push book-service
        shell: bash
        run: |
          IMAGE="${{ steps.vars.outputs.IMAGE_NS }}/book-service"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ steps.vars.outputs.SHA_TAG }}" ./services/book-service
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ steps.vars.outputs.SHA_TAG }}"

      - name: Build & push user-service
        shell: bash
        run: |
          IMAGE="${{ steps.vars.outputs.IMAGE_NS }}/user-service"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ steps.vars.outputs.SHA_TAG }}" ./services/user-service
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ steps.vars.outputs.SHA_TAG }}"

      - name: Build & push mcp-server
        shell: bash
        run: |
          IMAGE="${{ steps.vars.outputs.IMAGE_NS }}/mcp-server"
          docker build -t "${IMAGE}:latest" -t "${IMAGE}:${{ steps.vars.outputs.SHA_TAG }}" ./services/mcp-server
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${{ steps.vars.outputs.SHA_TAG }}"
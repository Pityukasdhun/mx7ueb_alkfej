apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: mx7ueb
spec:
  selector:
    app: user-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: mx7ueb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/pityukasdhun/mx7ueb_alkfej/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
